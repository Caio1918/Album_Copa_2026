<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ГЃlbum Copa 2026</title>
    <style>
      .topbar {
        display: none !important;
      }

      .album-search {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        padding: 14px 16px;
        font-size: 15px;
        box-shadow: 0 8px 24px rgba(16, 32, 24, 0.04);
      }

      .group-card {
        min-height: 150px;
      }

      .group-teams {
        display: grid;
        gap: 5px;
        margin-top: 14px;
      }

      .group-teams small {
        color: var(--text);
        font-weight: 700;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const API_URL = import.meta.env?.VITE_API_URL || 'http://localhost:8000'
      let albumData = { grupos: [], selecoes: [], jogadores: [] }

      const flags = {
        BRA: 'рџ‡§рџ‡·', ARG: 'рџ‡¦рџ‡·', FRA: 'рџ‡«рџ‡·', GER: 'рџ‡©рџ‡Є', ALE: 'рџ‡©рџ‡Є', ESP: 'рџ‡Єрџ‡ё', POR: 'рџ‡µрџ‡№', ENG: 'рџЏґ', ING: 'рџЏґ', ITA: 'рџ‡®рџ‡№', NED: 'рџ‡ірџ‡±', HOL: 'рџ‡ірџ‡±', BEL: 'рџ‡§рџ‡Є', CRO: 'рџ‡­рџ‡·', URU: 'рџ‡єрџ‡ѕ', MEX: 'рџ‡Ірџ‡Ѕ', USA: 'рџ‡єрџ‡ё', EUA: 'рџ‡єрџ‡ё', CAN: 'рџ‡Ёрџ‡¦', JPN: 'рџ‡Їрџ‡µ', JAP: 'рџ‡Їрџ‡µ', KOR: 'рџ‡°рџ‡·', COR: 'рџ‡°рџ‡·', AUS: 'рџ‡¦рџ‡є', MAR: 'рџ‡Ірџ‡¦', SEN: 'рџ‡ёрџ‡і', GHA: 'рџ‡¬рџ‡­', NGA: 'рџ‡ірџ‡¬', EGY: 'рџ‡Єрџ‡¬', TUN: 'рџ‡№рџ‡і', ALG: 'рџ‡©рџ‡ї', CMR: 'рџ‡Ёрџ‡І', SUI: 'рџ‡Ёрџ‡­', SUIГ‡A: 'рџ‡Ёрџ‡­', DEN: 'рџ‡©рџ‡°', DIN: 'рџ‡©рџ‡°', SWE: 'рџ‡ёрџ‡Є', SUE: 'рџ‡ёрџ‡Є', NOR: 'рџ‡ірџ‡ґ', POL: 'рџ‡µрџ‡±', POLONIA: 'рџ‡µрџ‡±', AUT: 'рџ‡¦рџ‡№', TUR: 'рџ‡№рџ‡·', TURQUIA: 'рџ‡№рџ‡·', COL: 'рџ‡Ёрџ‡ґ', CHI: 'рџ‡Ёрџ‡±', ECU: 'рџ‡Єрџ‡Ё', PER: 'рџ‡µрџ‡Є', PAR: 'рџ‡µрџ‡ѕ', BOL: 'рџ‡§рџ‡ґ', VEN: 'рџ‡»рџ‡Є', QAT: 'рџ‡¶рџ‡¦', KSA: 'рџ‡ёрџ‡¦', ARS: 'рџ‡ёрџ‡¦', IRN: 'рџ‡®рџ‡·', IRA: 'рџ‡®рџ‡·'
      }

      function normalize(value) {
        return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim()
      }

      function flagFor(selecao) {
        const sigla = String(selecao.sigla || '').toUpperCase()
        const nome = String(selecao.nome || '').toUpperCase()
        if (flags[sigla]) return flags[sigla]
        if (nome.includes('BRASIL')) return 'рџ‡§рџ‡·'
        if (nome.includes('ARGENTINA')) return 'рџ‡¦рџ‡·'
        if (nome.includes('FRANГ‡A')) return 'рџ‡«рџ‡·'
        if (nome.includes('ALEMANHA')) return 'рџ‡©рџ‡Є'
        if (nome.includes('ESPANHA')) return 'рџ‡Єрџ‡ё'
        if (nome.includes('PORTUGAL')) return 'рџ‡µрџ‡№'
        if (nome.includes('INGLATERRA')) return 'рџЏґ'
        if (nome.includes('ITГЃLIA') || nome.includes('ITALIA')) return 'рџ‡®рџ‡№'
        if (nome.includes('HOLANDA') || nome.includes('PAГЌSES BAIXOS') || nome.includes('PAISES BAIXOS')) return 'рџ‡ірџ‡±'
        if (nome.includes('URUGUAI')) return 'рџ‡єрџ‡ѕ'
        if (nome.includes('MГ‰XICO') || nome.includes('MEXICO')) return 'рџ‡Ірџ‡Ѕ'
        if (nome.includes('ESTADOS UNIDOS')) return 'рџ‡єрџ‡ё'
        if (nome.includes('CANADГЃ') || nome.includes('CANADA')) return 'рџ‡Ёрџ‡¦'
        if (nome.includes('JAPГѓO') || nome.includes('JAPAO')) return 'рџ‡Їрџ‡µ'
        return 'рџЏіпёЏ'
      }

      async function loadAlbumData() {
        if (albumData.grupos.length || albumData.selecoes.length || albumData.jogadores.length) return albumData

        const [gruposResponse, selecoesResponse, jogadoresResponse] = await Promise.all([
          fetch(`${API_URL}/grupos`),
          fetch(`${API_URL}/selecoes`),
          fetch(`${API_URL}/jogadores`),
        ])

        albumData = {
          grupos: await gruposResponse.json(),
          selecoes: await selecoesResponse.json(),
          jogadores: await jogadoresResponse.json(),
        }

        return albumData
      }

      function getCardGrupo(card) {
        const grupoNome = card.querySelector('span')?.textContent
        return albumData.grupos.find((item) => item.nome === grupoNome)
      }

      function grupoMatchesSearch(grupo, query) {
        if (!query) return true

        const selecoesDoGrupo = albumData.selecoes.filter((selecao) => selecao.grupo_id === grupo?.id)
        const selecaoIds = new Set(selecoesDoGrupo.map((selecao) => selecao.id))
        const jogadoresDoGrupo = albumData.jogadores.filter((jogador) => selecaoIds.has(jogador.selecao_id))

        return selecoesDoGrupo.some((selecao) => normalize(selecao.nome).includes(query) || normalize(selecao.sigla).includes(query)) || jogadoresDoGrupo.some((jogador) => normalize(jogador.nome).includes(query))
      }

      function applyAlbumSearch() {
        const input = document.querySelector('.album-search')
        const query = normalize(input?.value)
        const cards = Array.from(document.querySelectorAll('.group-card'))

        cards.forEach((card) => {
          const grupo = getCardGrupo(card)
          card.style.display = grupoMatchesSearch(grupo, query) ? '' : 'none'
        })
      }

      function ensureAlbumSearch() {
        const pageTitle = document.querySelector('.page-title h2')
        if (!pageTitle || pageTitle.textContent !== 'Grupos da Copa') return
        if (document.querySelector('.album-search')) return

        const input = document.createElement('input')
        input.className = 'album-search'
        input.placeholder = 'Pesquisar seleГ§ГЈo ou jogador...'
        input.type = 'search'
        input.addEventListener('input', applyAlbumSearch)
        pageTitle.closest('.page-title')?.insertAdjacentElement('afterend', input)
      }

      async function addTeamsToGroupCards() {
        const cards = Array.from(document.querySelectorAll('.group-card'))
        if (!cards.length) return

        try {
          await loadAlbumData()

          cards.forEach((card) => {
            if (card.querySelector('.group-teams')) return

            const grupo = getCardGrupo(card)
            const selecoesDoGrupo = albumData.selecoes.filter((selecao) => selecao.grupo_id === grupo?.id)
            const wrapper = document.createElement('div')

            wrapper.className = 'group-teams'
            wrapper.innerHTML = selecoesDoGrupo.length
              ? selecoesDoGrupo.map((selecao) => `<small>${flagFor(selecao)} ${selecao.nome}</small>`).join('')
              : '<small>рџЏіпёЏ SeleГ§Гµes nГЈo cadastradas</small>'

            card.querySelector('strong')?.insertAdjacentElement('beforebegin', wrapper)
          })

          ensureAlbumSearch()
          applyAlbumSearch()
        } catch {
          return
        }
      }

      let attempts = 0
      const timer = window.setInterval(() => {
        attempts += 1
        addTeamsToGroupCards()
        if (attempts >= 30) {
          window.clearInterval(timer)
        }
      }, 300)
    </script>
  </body>
</html>
